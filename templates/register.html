<!-- templates/register.html -->
{% extends "base.html" %}
{% block title %}Register - SmartCredit{% endblock %}
{% block content %}
<div class="form-container">
    <div class="form-card">
        <h2>Create Account</h2>
        <form method="POST" autocomplete="off">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: #667eea; font-weight: 600;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
